<main class="dashboard-shell" *ngIf="activeSession as session">
  <header class="top-menu">
    <div class="app-title">Neethi Clinical Lab</div>
    <nav>
      <ng-container *ngFor="let menu of dropdownMenus">
        <div class="menu-group" *ngIf="hasMenuGroupPermission(menu.key)" [class.open]="openTopMenu === menu.key">
          <button type="button" class="menu-trigger" (click)="toggleTopMenu(menu.key, $event)">{{ menu.label }}</button>

          <div
            class="dropdown-panel"
            *ngIf="openTopMenu === menu.key"
            [style.width.px]="menu.width"
            (click)="$event.stopPropagation()"
          >
            <ng-container *ngFor="let item of menu.items">
              <button
                type="button"
                class="dropdown-item"
                *ngIf="hasActionPermission(item.action)"
                [class.active]="menu.key === 'reports' && openReportsSubmenu === item.action"
                (mouseenter)="menu.key === 'reports' ? openSubmenu(item.action) : openSubmenu(null)"
                (click)="handleTopMenuItemClick(item.action, $event)"
              >
                <span class="dropdown-badge" *ngIf="item.badge">{{ item.badge }}</span>
                <span class="dropdown-label">{{ item.label }}</span>
                <span class="dropdown-arrow" *ngIf="item.hasChildIndicator">&gt;</span>
              </button>
            </ng-container>

            <div
              class="submenu-panel"
              *ngIf="menu.key === 'reports'"
              (mouseenter)="openSubmenu(openReportsSubmenu)"
            >
              <ng-container *ngFor="let item of menu.items">
                <div
                  class="submenu-list"
                  *ngIf="openReportsSubmenu === item.action && item.children"
                  [style.width.px]="item.childWidth || 240"
                >
                  <ng-container *ngFor="let child of item.children">
                    <button
                      type="button"
                      class="dropdown-item submenu-item"
                      *ngIf="hasActionPermission(child.action)"
                      (click)="handleTopMenuItemClick(child.action, $event)"
                    >
                      <span class="dropdown-label">{{ child.label }}</span>
                    </button>
                  </ng-container>
                </div>
              </ng-container>
            </div>
          </div>
        </div>
      </ng-container>
    </nav>
  </header>

  <ng-container *ngIf="currentTime$ | async as currentTime">
    <section class="date-band">
      {{ currentTime | date:'EEEE, dd MMMM, yyyy' }} , {{ currentTime | date:'hh:mm:ss a' }}
    </section>

    <section class="home-layout">
      <aside class="side-menu">
        <ng-container *ngFor="let item of menuItems">
          <button *ngIf="hasSidebarItemPermission(item)" (click)="handleMenuClick(item)">
            <span>{{ item.charAt(0) }}</span>{{ item.slice(1) }}
          </button>
        </ng-container>

        <div class="side-logo">
          <img src="assets/logo.png" alt="Neethi Lab Logo" class="side-logo-img">
        </div>
      </aside>

      <div class="hero-panel">
        <div class="lab-figure"></div>

        <app-patient-list
          *ngIf="activeRegistrationView === 'patients' || activeRegistrationView === 'pending-collection'"
          [mode]="activeRegistrationView === 'pending-collection' ? 'pending' : 'all'"
          [purpose]="patientListPurpose"
          (newRegistration)="openNewRegistration()"
          (patientSelected)="handlePatientSelected($event)"
          (closed)="closeRegistration()"
        ></app-patient-list>

        <app-bill-registration
          *ngIf="activeRegistrationView === 'new-registration'"
          [selectedVisitId]="selectedVisitId"
          [openMode]="billOpenMode"
          (advanceSearch)="openPatientAdvanceSearch()"
          (resultEntry)="openResultEntry($event)"
          (closed)="closeRegistration()"
        ></app-bill-registration>

        <app-result-entry
          *ngIf="activeRegistrationView === 'result-entry'"
          [selectedVisitId]="selectedVisitId"
          (closed)="closeRegistration()"
        ></app-result-entry>

        <app-bill-cancellation
          *ngIf="activeRegistrationView === 'bill-cancellation'"
          (closed)="closeRegistration()"
        ></app-bill-cancellation>


        <app-patient-advance-search
          *ngIf="activeRegistrationView === 'patient-advance-search'"
          (openRequested)="openFromAdvanceSearch($event)"
          (closed)="closeRegistration()"
        ></app-patient-advance-search>

        <app-collection-summary-dialog
          *ngIf="activeCollectionSummaryMode"
          [mode]="activeCollectionSummaryMode"
          [title]="activeCollectionSummaryTitle"
          (closed)="closeCollectionSummary()"
        ></app-collection-summary-dialog>

        <app-accounts-heads
          *ngIf="activeRegistrationView === 'accounts-heads'"
          (closed)="closeRegistration()"
        ></app-accounts-heads>

        <app-cash-voucher
          *ngIf="activeRegistrationView === 'cash-payments' || activeRegistrationView === 'cash-receipts'"
          [type]="activeRegistrationView === 'cash-payments' ? 'payment' : 'receipt'"
          (closed)="closeRegistration()"
        ></app-cash-voucher>

        <app-day-book
          *ngIf="activeRegistrationView === 'day-book'"
          (closed)="closeRegistration()"
        ></app-day-book>

        <app-journal
          *ngIf="activeRegistrationView === 'journal'"
          (closed)="closeRegistration()"
        ></app-journal>

        <app-reagent-items
          *ngIf="activeRegistrationView === 'reagent-items'"
          (closed)="closeRegistration()"
        ></app-reagent-items>

        <app-stock-transaction
          *ngIf="activeRegistrationView === 'stock-inward' || activeRegistrationView === 'stock-outward'"
          [mode]="activeRegistrationView === 'stock-inward' ? 'inward' : 'outward'"
          (closed)="closeRegistration()"
        ></app-stock-transaction>

        <app-stock-report
          *ngIf="activeRegistrationView === 'stock-report'"
          (closed)="closeRegistration()"
        ></app-stock-report>

        <app-user-management
          *ngIf="activeRegistrationView === 'user-management'"
          (closed)="closeRegistration()"
        ></app-user-management>
      </div>
    </section>

    <footer class="status-bar">
      <span>Work Station : LOCALHOST</span>
      <span>Login time : {{ session.login_at | date:'hh:mm:ss a' }}</span>
      <span>USER : {{ session.username }}</span>
      <span class="status-date">{{ currentTime | date:'dd-MMM-yy' }}</span>
      <span class="status-time">{{ currentTime | date:'h:mm a' }}</span>
    </footer>
  </ng-container>
</main>
