<main class="app-shell">
  <section class="login-window" aria-label="User login">
    <header class="window-title">User login..</header>

    <div class="login-body">
      <aside class="module-panel">
        <div class="module-title">
          Lab management system
        </div>

        <div class="logo-placeholder" aria-label="Logo placeholder">
          <img src="assets/logo.png" alt="Neethi Lab Logo" class="brand-logo-img">
          <div class="brand-name">Neethi Lab</div>
        </div>
      </aside>

      <section class="credential-panel">
        <div class="visual-strip" aria-hidden="true">
          <div class="care-logo">
            <img src="assets/logo.png" alt="Neethi Lab Logo" class="login-brand-logo">
          </div>
        </div>

        <form class="login-form" (ngSubmit)="login()" *ngIf="currentTime$ | async as currentTime">
          <div class="date-line">
            <span>{{ currentTime | date:'EEEE, dd MMMM, yyyy' }}</span>
            <strong>{{ currentTime | date:'hh:mm:ss a' }}</strong>
          </div>

          <label>
            <span>User Name</span>
            <input class="username-input" name="username" [(ngModel)]="username" autocomplete="username" autofocus (keydown.enter)="focusPassword($event)" (blur)="lookupRole()">
          </label>

          <label>
            <span>Role</span>
            <input class="role-input" name="role" [value]="userRoleDisplay" placeholder="Auto-filled" readonly disabled tabindex="-1" style="background: #e9ecef; color: #495057; cursor: not-allowed; border: 1px solid #ced4da;">
          </label>

          <label>
            <span>Password</span>
            <input name="password" [(ngModel)]="password" type="password" autocomplete="current-password" (keydown.enter)="submitFromPassword($event)">
          </label>


          <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

          <footer class="button-bar">
            <button type="submit" [disabled]="isSubmitting">
              <span class="button-icon">IN</span>
              {{ isSubmitting ? 'Saving...' : 'Login' }}
            </button>
            <button type="button" (click)="reset()">
              <span class="button-icon">X</span>
              Exit
            </button>
          </footer>
        </form>
      </section>
    </div>
  </section>
</main>
